services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    ports:
      - "${PORT_MYSQL}"
    volumes:
      - db_data:/var/lib/mysql
  frontend:
    build: ./app
    ports:
      - "${PORT_FRONTEND}"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./n8n
    ports:
      - "${PORT_BACKEND}"
    networks:
      - app-network
    environment:
      - TZ=${TIMEZONE}

networks:
  app-network:
    driver: bridge

volumes:
  db_data: