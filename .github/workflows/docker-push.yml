name: Docker CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the new git tag
    strategy:
      matrix:
        include:
          - name: app
            context: ./app
            file: ./app/Dockerfile
            image: typescript-docker-app
          - name: n8n
            context: ./n8n
            file: ./n8n/dockerfile
            image: n8n-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for versioning

      # 1. Generate a unique SemVer tag for each service
      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVICE_NAME: ${{ matrix.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get the latest tag for this service
          LATEST_TAG=$(git tag -l "$SERVICE_NAME-v*" --sort=-version:refname | head -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            # First tag for this service
            NEW_TAG="$SERVICE_NAME-v1.0.0"
          else
            # Parse version and bump patch
            VERSION=${LATEST_TAG#$SERVICE_NAME-v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="$SERVICE_NAME-v$MAJOR.$MINOR.$NEW_PATCH"
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          # Create and push the tag
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Extract Metadata using the NEW tag
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Use the version generated by the tag action (e.g. app-v1.0.1)
            type=raw,value=${{ steps.tag_version.outputs.new_tag }},enable=${{ github.event_name == 'push' }}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max